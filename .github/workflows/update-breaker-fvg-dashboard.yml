name: Update Breaker FVG Dashboard

on:
  workflow_dispatch:
  schedule:
    # Runs hourly during the regular NSE session.
    # GitHub cron uses UTC: 03:45-09:45 UTC = 9:15 AM-3:15 PM IST.
    - cron: "45 3-9 * * 1-5"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Newtest/Breaker_Based

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Newtest/Breaker_Based/requirements_dashboard.txt

      - name: Install dependencies
        run: python -m pip install -r requirements_dashboard.txt

      - name: Refresh dashboard data
        run: python breaker_fvg_dashboard_export.py --period-days 30 --interval 1h

      - name: Run Telegram scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python breaker_fvg_scan.py

      - name: Commit refreshed data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add breaker_fvg_dashboard_data.js
          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
          else
            git commit -m "Update Breaker FVG dashboard data"
            git push
          fi
